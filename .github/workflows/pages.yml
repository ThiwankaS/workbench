# Publish workbench.html as a live site on GitHub Pages.
# Repo browser still shows HTML as source; use the Pages URL to view the page.
#
# Live URL (after first deploy):
#   https://thiwankas.github.io/workbench/
#
# Enable once: Settings → Pages → Build and deployment → Source: GitHub Actions

name: Deploy workbench to GitHub Pages

on:
  push:
    branches: [main, master]
    paths:
      - "workbench.html"
      - "index.html"
      - "assets/**"
      - ".github/workflows/pages.yml"
      - ".nojekyll"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare static site
        run: |
          mkdir -p _site
          cp index.html workbench.html .nojekyll _site/
          cp -r assets _site/

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
