# Deploy workbench.html to GitHub Pages via the gh-pages branch.
#
# Why not "GitHub Actions" Pages source?
#   configure-pages fails with 404 until Pages is enabled manually in Settings.
#   This workflow only pushes static files; you enable Pages once (see below).
#
# After the first successful run:
#   Settings → Pages → Build and deployment → Deploy from a branch
#   Branch: gh-pages  /  Folder: / (root)
#
# Live URL: https://thiwankas.github.io/workbench/

name: Deploy workbench to GitHub Pages

on:
  push:
    branches: [main, master]
    paths:
      - "workbench.html"
      - "index.html"
      - "assets/**"
      - ".github/workflows/pages.yml"
      - ".nojekyll"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages-gh-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build static site
        run: |
          mkdir -p _site
          cp index.html workbench.html .nojekyll _site/
          cp -r assets _site/
          echo "Site root:"
          find _site -type f | head -20

      - name: Push to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
          publish_branch: gh-pages
          commit_message: "deploy: workbench site"
